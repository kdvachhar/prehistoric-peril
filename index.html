<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Prehistoric Peril</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: monospace;
    }
    canvas {
      border: 4px solid #8B4513;
      border-radius: 4px;
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #controls {
      color: #C8A862;
      font-size: 13px;
      margin-top: 8px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
<canvas id="main-game-display" width="900" height="520"></canvas>
<div id="controls">← →: Move &nbsp;|&nbsp; ↑: Jump &nbsp;|&nbsp; ↓: Swing Bat &nbsp;|&nbsp; Space: Pause &nbsp;|&nbsp; R: Restart</div>
<script src="level1.js"></script>
<script src="engine.js"></script>
</body>
</html>
